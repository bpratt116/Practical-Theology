# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Practical Theology
subtitle: for every day life.
repository: bpratt116/Practical-Theology
masthead_title: "Practical Theology"
title_separator: "|"
name: Brendan Pratt
email: "bpratt116@gmail.com"
description: >- # this means to ignore newlines until "baseurl:"
  Notes on Scripture, prayer, and the Christian life by Brendan Pratt.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://brendanpratt.org" # the base hostname & protocol for your site
twitter_username: bpratt116
github_username: bpratt116

author:
  name     : "Brendan Pratt"
  avatar   : "/assets/profile.jpg"
  bio      : "Practical Theology for every day life"
  location : "Ohio, USA"
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/brendanpratt/"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/bpratt116"
    - label: "Twitter"
      icon: "fab fa-twitter"
      url: "https://twitter.com/bpratt116"
    - label: "Instagram"
      icon: "fab fa-instagram"
      url: "https://instagram.com/bpratt116"


defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true
      toc_sticky: true
      toc_label: "On this page"
      toc_icon: "book"
      

include:
  - _pages

# Build settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Search (Lunr is built into Minimal Mistakes)
search: true
search_full_content: true
search_provider: lunr

# Archive pages (tags and categories)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Comments — Giscus (https://giscus.app)
# To enable: 1) enable Discussions on the repo, 2) install the Giscus GitHub app,
# 3) visit https://giscus.app to generate the repo_id and category_id, then paste below.
comments:
  provider: "giscus"
  giscus:
    repo_id              : "R_kgDOJOnGbQ"
    category_name        : "Announcements"
    category_id          : "DIC_kwDOJOnGbc4C7HhY"
    discussion_term      : "pathname"
    reactions_enabled    : "1"
    theme                : "light"
    strict               : "0"
    input_position       : "bottom"
    emit_metadata        : "0"
    lang                 : "en"

# Analytics — Google Analytics 4
# To enable: create a GA4 property at https://analytics.google.com, copy the
# Measurement ID (looks like G-XXXXXXXXXX), and paste it below.
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-6VYW7NDKTY"
    anonymize_ip: true

# SEO / social previews
logo: "/assets/profile.jpg"
social:
  type: Person
  name: "Brendan Pratt"
  links:
    - "https://www.linkedin.com/in/brendanpratt/"
    - "https://github.com/bpratt116"
    - "https://twitter.com/bpratt116"
    - "https://instagram.com/bpratt116"
twitter:
  username: bpratt116

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
