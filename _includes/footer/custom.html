<button type="button"
        id="pt-theme-toggle"
        class="theme-toggle"
        aria-label="Toggle color theme"
        title="Toggle color theme">
  <span aria-hidden="true" id="pt-theme-icon">☾</span>
</button>

<script>
  // Promote the sidebar author name from h3 to h2 so the document heading
  // order starts at h1 -> h2 instead of h1 -> h3 (Lighthouse a11y fix).
  (function () {
    document.querySelectorAll('h3.author__name').forEach(function (h3) {
      var h2 = document.createElement('h2');
      Array.from(h3.attributes).forEach(function (a) {
        h2.setAttribute(a.name, a.value);
      });
      h2.innerHTML = h3.innerHTML;
      h3.replaceWith(h2);
    });
  })();

  (function () {
    var btn = document.getElementById('pt-theme-toggle');
    var icon = document.getElementById('pt-theme-icon');
    if (!btn || !icon) return;

    function setIcon() {
      var isLight = document.documentElement.getAttribute('data-theme') === 'light';
      icon.textContent = isLight ? '☀' : '☾';
      btn.setAttribute('aria-pressed', String(isLight));
    }

    setIcon();

    btn.addEventListener('click', function () {
      var isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        try { localStorage.setItem('pt-theme', 'dark'); } catch (e) {}
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        try { localStorage.setItem('pt-theme', 'light'); } catch (e) {}
      }
      setIcon();
    });
  })();
</script>
